<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeowUp</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Title bar -->
    <div class="titlebar" style="display:none">
      <span class="titlebar-title">
        <img src="/logo.png" class="titlebar-logo" alt="" />
        MeowUp
      </span>
      <div class="titlebar-buttons">
        <button class="titlebar-btn" id="closeBtn" title="回到迷你模式">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <!-- Main content -->
    <div class="content" style="display:none">
      <!-- Bear character -->
      <div class="bear-container" id="bearContainer">
        <svg id="bearSvg" viewBox="0 0 200 200" class="bear"></svg>
      </div>

      <!-- Timer ring -->
      <div class="timer-ring-container">
        <svg class="timer-ring" viewBox="0 0 200 200">
          <circle class="timer-ring-bg" cx="100" cy="100" r="88" />
          <circle class="timer-ring-progress" id="progressRing" cx="100" cy="100" r="88" />
        </svg>
        <div class="timer-text">
          <div class="timer-time" id="timerDisplay">45:00</div>
          <div class="timer-label" id="timerLabel">坐姿时间</div>
        </div>
      </div>

      <!-- Status message -->
      <div class="status-message" id="statusMessage"></div>

      <!-- Controls -->
      <div class="controls" id="controls">
        <button class="btn btn-secondary" id="resetBtn" title="重置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.65 6.35A7.96 7.96 0 0012 4C7.58 4 4 7.58 4 12s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
        </button>
        <button class="btn btn-primary" id="pauseBtn" title="暂停/继续">
          <svg id="pauseIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="4" width="4" height="16" rx="1"/>
            <rect x="14" y="4" width="4" height="16" rx="1"/>
          </svg>
          <svg id="playIcon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>
        <button class="btn btn-secondary" id="switchModeBtn" title="切换坐/站">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"/>
          </svg>
        </button>
        <button class="btn btn-secondary" id="settingsBtn" title="设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.04.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/>
          </svg>
        </button>
      </div>

      <!-- Settings panel (hidden by default) -->
      <div class="settings-panel" id="settingsPanel" style="display:none">
        <div class="settings-title">
          <span>⚙️ 设置</span>
          <button class="settings-close" id="settingsCloseBtn">✕</button>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">🐱 小伙伴</div>
          <div class="character-select" id="characterSelect">
            <button class="char-btn active" data-char="white-blue"><img src="/src/white-blue-cat.png" class="char-icon" /></button>
            <button class="char-btn" data-char="black"><img src="/src/black-cat.png" class="char-icon" /></button>
            <button class="char-btn" data-char="ginger"><img src="/src/ginger-cat.png" class="char-icon" /></button>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">⏰ 计时</div>
          <div class="setting-row">
            <label>坐姿时长</label>
            <div class="setting-input-group">
              <input type="number" id="sitMinutes" value="45" min="1" max="120" />
              <span class="setting-unit">分钟</span>
            </div>
          </div>
          <div class="setting-row">
            <label>站姿时长</label>
            <div class="setting-input-group">
              <input type="number" id="standMinutes" value="5" min="1" max="60" />
              <span class="setting-unit">分钟</span>
            </div>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">🕐 工作时间</div>
          <div class="setting-row">
            <label>上班时间</label>
            <select id="workStart">
              <option value="07:00">07:00</option>
              <option value="07:30">07:30</option>
              <option value="08:00">08:00</option>
              <option value="08:30">08:30</option>
              <option value="09:00" selected>09:00</option>
              <option value="09:30">09:30</option>
              <option value="10:00">10:00</option>
              <option value="10:30">10:30</option>
              <option value="11:00">11:00</option>
            </select>
          </div>
          <div class="setting-row">
            <label>下班时间</label>
            <select id="offWork">
              <option value="17:00">17:00</option>
              <option value="17:30">17:30</option>
              <option value="18:00" selected>18:00</option>
              <option value="18:30">18:30</option>
              <option value="19:00">19:00</option>
              <option value="19:30">19:30</option>
              <option value="20:00">20:00</option>
              <option value="20:30">20:30</option>
              <option value="21:00">21:00</option>
            </select>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">☕ 午休</div>
          <div class="setting-row">
            <label>开始时间</label>
            <select id="lunchStart">
              <option value="11:00">11:00</option>
              <option value="11:30">11:30</option>
              <option value="12:00" selected>12:00</option>
              <option value="12:30">12:30</option>
              <option value="13:00">13:00</option>
              <option value="13:30">13:30</option>
              <option value="14:00">14:00</option>
            </select>
          </div>
          <div class="setting-row">
            <label>休息时长</label>
            <select id="lunchDuration">
              <option value="10">10 分钟</option>
              <option value="20">20 分钟</option>
              <option value="30">30 分钟</option>
              <option value="40">40 分钟</option>
              <option value="50">50 分钟</option>
              <option value="60" selected>1 小时</option>
              <option value="70">1 小时 10 分</option>
              <option value="80">1 小时 20 分</option>
              <option value="90">1 小时 30 分</option>
              <option value="100">1 小时 40 分</option>
              <option value="110">1 小时 50 分</option>
              <option value="120">2 小时</option>
            </select>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">🔔 提醒</div>
          <div class="setting-row">
            <label>音效提醒</label>
            <label class="toggle-switch">
              <input type="checkbox" id="soundEnabled" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="save-row">
          <button class="btn btn-confirm" id="saveSettingsBtn">保存</button>
          <div class="save-toast" id="saveToast"></div>
        </div>
      </div>
    </div>

    <!-- Mini mode (floating bear) -->
    <div class="mini-mode" id="miniMode">
      <div class="mini-bear-wrapper">
        <svg id="miniBearSvg" viewBox="0 0 200 200" class="mini-bear" draggable="false"></svg>
        <svg class="mini-ring" viewBox="0 0 80 80">
          <circle class="mini-ring-bg" cx="40" cy="40" r="36" />
          <circle class="mini-ring-progress" id="miniProgressRing" cx="40" cy="40" r="36" />
        </svg>
      </div>
      <div class="mini-tooltip" id="miniTooltip">
        <span id="miniTime">45:00</span> <span id="miniTooltipLabel">后站起来</span>
      </div>
      <button class="mini-confirm-btn" id="miniConfirmBtn" style="display:none">我站起来了</button>
    </div>

    <!-- Reminder overlay -->
    <div class="reminder-overlay" id="reminderOverlay" style="display:none">
      <div class="reminder-content">
        <div class="reminder-bear" id="reminderBear"></div>
        <div class="reminder-text" id="reminderText">该站起来啦！</div>
        <div class="reminder-subtext">活动一下，保护你的腰~</div>
        <button class="btn btn-reminder" id="reminderBtn">好的，我起来了！</button>
        <div class="reminder-countdown" id="reminderCountdown">30 秒后自动切换</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/app.js"></script>
</body>
</html>
