<!DOCTYPE html>
<html>
<head>
<meta name="color-scheme" content="light dark">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    user-select: none;
    width: 100%;
    height: 100%;
  }
  .wrap {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 28px 36px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(255, 155, 80, 0.2);
    animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .card.stand {
    box-shadow: 0 8px 40px rgba(107, 203, 119, 0.2);
  }
  .emoji {
    font-size: 48px;
    margin-bottom: 12px;
    animation: bounce 1s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .title {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent, #FF9B50);
    margin-bottom: 6px;
  }
  .card.stand .title { color: #6BCB77; }
  .sub {
    font-size: 14px;
    color: #8B7355;
    margin-bottom: 20px;
  }
  .btn {
    padding: 12px 32px;
    border: none;
    border-radius: 50px;
    background: #FF9B50;
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(255, 155, 80, 0.3);
  }
  .card.stand .btn {
    background: #6BCB77;
    box-shadow: 0 4px 16px rgba(107, 203, 119, 0.3);
  }
  .btn:hover { transform: scale(1.05); }
  .countdown {
    margin-top: 12px;
    font-size: 12px;
    color: #aaa;
  }
  @keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="card">
      <div class="emoji" id="emoji">🐱</div>
      <div class="title" id="title">该站起来啦！</div>
      <div class="sub" id="sub">活动一下，保护你的腰~</div>
      <button class="btn" id="confirmBtn">好的，我起来了！</button>
      <div class="countdown" id="countdown">30 秒后自动关闭</div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title') || '该站起来啦！';
    const sub = params.get('sub') || '活动一下，保护你的腰~';
    const btnText = params.get('btn') || '好的，我起来了！';
    const isStand = params.get('stand') === '1';

    document.getElementById('title').textContent = title;
    document.getElementById('sub').textContent = sub;
    document.getElementById('confirmBtn').textContent = btnText;
    if (isStand) {
      document.getElementById('card').classList.add('stand');
      document.getElementById('emoji').textContent = '🧍';
    }

    let sec = 30;
    const cdEl = document.getElementById('countdown');
    const timer = setInterval(() => {
      sec--;
      if (sec <= 0) {
        clearInterval(timer);
        cdEl.textContent = '自动关闭...';
      } else {
        cdEl.textContent = sec + ' 秒后自动关闭';
      }
    }, 1000);

    document.getElementById('confirmBtn').addEventListener('click', () => {
      try { window.close(); } catch (e) {}
    });
  </script>
</body>
</html>
